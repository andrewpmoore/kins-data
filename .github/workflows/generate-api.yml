name: Generate Daily Static API

on:
  schedule:
    - cron: '0 0 * * *' # Runs at 00:00 every day
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository (Main)
        uses: actions/checkout@v4

      - name: Checkout Existing API Data Branch
        continue-on-error: true # Might fail if first time run
        uses: actions/checkout@v4
        with:
          ref: api-data
          path: api

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas requests
          mkdir -p data
          mkdir -p api

      - name: Run Hybrid API Generator Script (Incremental)
        env:
          TMDB_TOKEN: ${{ secrets.TMDB_TOKEN }}
          LASTFM_KEY: ${{ secrets.LASTFM_KEY }}
        run: python build_api.py

      - name: Force Push to Dedicated Data Branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git checkout -B api-data
          git add api/ -f
          
          git commit -m "chore: automated hybrid API data generation (Last.fm)" || true
          git push --force origin api-data
